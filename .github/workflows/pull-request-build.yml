name: Pull Request Voter

env:
  MAVEN_VERSION: '3.6.3'

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]
    types: [reopened, synchronize, opened]

jobs:
  blackduck:
    name: Blackduck Scan
    if: github.actor != 'dependabot[bot]'
    environment: Codescans
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Scan With Black Duck
        uses: cap-java/.github/actions/scan-with-blackduck@296573b55e906f5c77a1855bcfe4285cbbc5cac4
        with:
          blackduck_token: ${{ secrets.BLACK_DUCK_TOKEN }}
          maven-version: ${{ env.MAVEN_VERSION }}
          project-name: com.sap.cds.feature.advanced-event-mesh
          included-modules: cds-feature-advanced-event-mesh
          scan_mode: RAPID
          rapid_compare_mode: BOM_COMPARE # PRs might only be blocked by things they introduce, not by pre-existing issues that could have appeared in the main branch in the meantime

  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [ 17, 21 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build
        uses: ./.github/actions/build
        with:
          java-version: ${{ matrix.java-version }}
          maven-version: ${{ env.MAVEN_VERSION }}

      #- name: SonarQube Scan
      #  uses: ./.github/actions/scan-with-sonar
      #  if: ${{ matrix.java-version == 17 }}
      #  with:
      #    java-version: ${{ matrix.java-version }}
      #    maven-version: ${{ env.MAVEN_VERSION }}
      #    sonarq-token: ${{ secrets.SONARQ_TOKEN }}
      #    github-token: ${{ secrets.GITHUB_TOKEN }}
