  requires-approval:
    runs-on: ubuntu-latest
    name: "Waiting for release approval"
    environment: Release-Approval
    permissions:
      contents: read
    steps:
      - name: Approval Step
        run: echo "Release has been approved!"

  build:
    #name: Build and Sonar Scan
    name: Build
    runs-on: ubuntu-latest
    needs: requires-approval
    #needs: update-version
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      #- name: Download artifact
      #  uses: actions/download-artifact@v8
      #  with:
      #    name: root-new-version
      - name: Build
        uses: ./.github/actions/build
        with:
          java-version: ${{ env.JAVA_VERSION }}
          maven-version: ${{ env.MAVEN_VERSION }}
      #- name: Sonar Scan
      #  uses: ./.github/actions/scan-with-sonar
      #  with:
      #    java-version: ${{ env.JAVA_VERSION }}
      #    maven-version: ${{ env.MAVEN_VERSION }}
      #    sonarq-token: ${{ secrets.SONARQ_TOKEN }}
      #    github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Changed Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: root-build
          include-hidden-files: true
          path: .
          retention-days: 1

  deploy:
    name: Deploy to Maven Central
    runs-on: ubuntu-latest
    environment: Release
    #needs: [blackduck, build]
    needs: [build]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: root-build
      - name: Deploy
        uses: ./.github/actions/deploy-release
        with:
          user: ${{ secrets.CAP_JAVA_CDS_FEATURE_ADVANCED_EVENT_MESH_USER }}
          password: ${{ secrets.CAP_JAVA_CDS_FEATURE_ADVANCED_EVENT_MESH_PASS }}
          pgp-pub-key: ${{ secrets.PGP_PUBKEY_ID_AEM }}
          pgp-private-key: ${{ secrets.PGP_PRIVATE_KEY_AEM }}
          pgp-passphrase: ${{ secrets.PGP_PASSPHRASE_AEM }}
          revision: ${{ github.event.release.tag_name }}
          maven-version: ${{ env.MAVEN_VERSION }}
      - name: Echo Status
        run: echo "The job status is ${{ job.status }}"
